<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>sssss — encuestas</title>
    <meta name="description" content="Plataforma de encuestas LAMP-UMAG" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #ffffff;
        --foreground: #111111;
        --muted: #6b6b6b;
        --primary: #111111;
        --primary-foreground: #ffffff;
        --accent: #333333;
        --surface: #f7f7f7;
        --border: #e0e0e0;
        --ok: #16a34a;
        --warn: #d97706;
        --error: #dc2626;
      }
      * { box-sizing: border-box; }
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--foreground);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
      }
      button {
        font-family: inherit;
        font-size: inherit;
        line-height: inherit;
        color: inherit;
        margin: 0;
        border: none;
        background: transparent;
        padding: 0;
        cursor: pointer;
      }
      header {
        display: none;
        padding: 20px 24px;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: rgba(255,255,255,0.95);
        backdrop-filter: blur(8px);
        z-index: 10;
      }
      .brand {
        font-weight: 800;
        font-size: 18px;
        letter-spacing: -0.5px;
        color: var(--foreground);
        text-decoration: none;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .admin-link {
        font-size: 12px;
        color: var(--muted);
        text-decoration: none;
        padding: 6px 12px;
        border: 1px solid var(--border);
        border-radius: 999px;
        transition: all 0.15s ease;
      }
      .admin-link:hover {
        color: var(--foreground);
        border-color: var(--foreground);
      }
      main {
        max-width: 520px;
        margin: 0 auto;
        padding: 40px 16px;
        min-height: calc(100vh - 61px);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      @media (max-width: 640px) {
        main { padding: 24px 12px; }
        header { padding: 16px; }
      }

      /* ── Home ──────────────────────────── */
      #home { display: none; }
      .home-title {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 6px 0;
      }
      .home-heading {
        font-size: 26px;
        font-weight: 700;
        margin: 0 0 28px 0;
        line-height: 1.2;
      }
      .list { display: grid; gap: 10px; }
      .survey-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 20px;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        background: var(--bg);
        transition: border-color 0.15s ease, background 0.15s ease;
      }
      .survey-item:hover {
        border-color: var(--foreground);
        background: var(--surface);
      }
      .survey-item h3 {
        margin: 0 0 3px 0;
        font-size: 16px;
        font-weight: 600;
      }
      .survey-item p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }
      .survey-item button {
        flex-shrink: 0;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 18px;
        border-radius: 8px;
        background: var(--primary);
        color: var(--primary-foreground);
        white-space: nowrap;
        transition: background 0.15s ease, transform 0.1s ease;
      }
      .survey-item button:hover { background: var(--accent); transform: scale(1.02); }
      .survey-item button:active { transform: scale(0.98); }

      /* ── Runner ───────────────────────── */
      #runner {
        display: none;
        width: 100%;
        max-width: 520px;
        margin: 0 auto;
        padding: 0;
      }
      #meta { margin-bottom: 20px; }
      #meta .subtle, #meta .tiny { display: none; }
      .progress {
        margin: 0 0 32px;
        height: 3px;
        background: var(--border);
        border-radius: 999px;
        overflow: hidden;
      }
      .bar {
        height: 100%;
        width: 0%;
        background: var(--primary);
        transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        border-radius: 999px;
      }
      .section-header {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 16px 0;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
      }
      .info-text {
        font-size: 17px;
        line-height: 1.7;
        white-space: pre-line;
        color: var(--foreground);
        margin: 0 0 8px 0;
      }
      .item-instruction {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 10px;
        line-height: 1.5;
      }
      .q {
        font-size: 22px;
        font-weight: 600;
        line-height: 1.35;
        margin: 0 0 28px 0;
        color: var(--foreground);
      }
      @media (max-width: 640px) {
        .q { font-size: 20px; margin-bottom: 22px; }
        .info-text { font-size: 16px; }
      }
      .options {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 28px;
      }
      .opt {
        display: block;
        width: 100%;
        text-align: left;
        padding: 14px 16px;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: transparent;
        color: var(--foreground);
        font-size: 15px;
        font-weight: 500;
        transition: border-color 0.15s ease, background 0.15s ease;
        cursor: pointer;
      }
      .opt:hover {
        border-color: var(--foreground);
        background: var(--surface);
      }
      .opt.selected {
        background: var(--primary);
        color: var(--primary-foreground);
        border-color: var(--primary);
      }
      .opt.selected:hover {
        background: var(--accent);
        border-color: var(--accent);
      }
      .controls {
        display: flex;
        gap: 10px;
        margin-top: 12px;
        padding-top: 12px;
      }
      .btn {
        flex: 1;
        padding: 13px 20px;
        font-size: 15px;
        font-weight: 600;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.15s ease;
        border: none;
      }
      .btn.primary {
        background: var(--primary);
        color: var(--primary-foreground);
      }
      .btn.primary:hover {
        background: var(--accent);
        transform: translateY(-1px);
      }
      .btn.primary:active { transform: translateY(0); }
      .btn.secondary {
        background: transparent;
        color: var(--muted);
        border: 1.5px solid var(--border);
      }
      .btn.secondary:hover {
        color: var(--foreground);
        border-color: var(--foreground);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      input[type="number"],
      input[type="text"],
      input[type="email"],
      input[type="url"],
      input[type="tel"],
      input[type="date"],
      input[type="time"],
      textarea {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        font-family: inherit;
        border-radius: 10px;
        background: var(--surface);
        border: 1.5px solid var(--border);
        color: var(--foreground);
        transition: border-color 0.15s ease;
        margin-bottom: 28px;
        -webkit-appearance: none;
      }
      input:focus, textarea:focus {
        outline: none;
        border-color: var(--foreground);
      }
      textarea { min-height: 120px; resize: vertical; }
      input[type="range"] {
        width: 100%;
        accent-color: var(--primary);
        cursor: pointer;
        margin-bottom: 4px;
      }
      .tiny { font-size: 12px; color: var(--muted); }
      .center { text-align: center; }
      .hidden { display: none; }
      a { color: inherit; }
      a:hover { opacity: 0.7; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .splash-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease;
        z-index: 20;
      }
      .splash-overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }
      .splash-overlay img {
        max-width: min(180px, 36vw);
        height: auto;
      }

      /* ── Task launch card (in survey) ──────────────── */
      .task-launch-wrap {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 28px;
      }
      .task-launch-icon {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
      }
      .task-launch-title {
        font-size: 22px;
        font-weight: 700;
        color: var(--foreground);
        line-height: 1.2;
      }
      .task-launch-desc {
        font-size: 14px;
        color: var(--muted);
      }

      /* ══ Task overlay — full-screen dark shell ══════ */
      .task-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: #0F172A;
        color: #F1F5F9;
        font-family: 'Inter', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }

      /* ── Animations (task scope) ────────────────────── */
      @keyframes t-fadeUp  { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
      @keyframes t-popIn   { from { opacity:0; transform:scale(0.88); }     to { opacity:1; transform:scale(1); } }
      @keyframes t-blink   { 0%,100% { opacity:1; } 50% { opacity:0.18; } }
      @keyframes t-rtHitFlash {
        0%   { transform:scale(1);    opacity:0.9;  box-shadow:0 0 50px rgba(255,255,255,0.4); }
        100% { transform:scale(0.5);  opacity:0;    box-shadow:none; }
      }

      /* ── Intro screens ──────────────────────────────── */
      .task-overlay .test-intro {
        max-width: 500px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 1.1rem;
        animation: t-fadeUp 0.3s ease both;
      }
      .task-overlay .test-intro h2 {
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        margin: 0;
      }
      .task-overlay .test-intro p {
        color: #94A3B8;
        line-height: 1.6;
        margin: 0;
      }
      .task-overlay .test-intro p strong { color: #F1F5F9; }
      .task-overlay .test-intro-icon {
        width: 56px;
        height: 56px;
        border-radius: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
      }
      .task-overlay .hint { font-size: 0.85rem; }

      /* ── Primary button inside overlay ─────────────── */
      .task-overlay .btn-task-primary {
        background: #6366F1;
        color: #fff;
        border: none;
        border-radius: 1rem;
        font-family: inherit;
        font-size: 1rem;
        font-weight: 700;
        padding: 0.9rem 1.5rem;
        cursor: pointer;
        width: 100%;
        display: block;
        transition: background 0.15s, transform 0.1s;
      }
      .task-overlay .btn-task-primary:active { background: #4F46E5; transform: scale(0.98); }

      /* ── Trial layout ───────────────────────────────── */
      .task-overlay .trial-wrap {
        display: flex;
        flex-direction: column;
        height: 100dvh;
      }
      .task-overlay .trial-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.9rem 1.1rem 0.6rem;
        flex-shrink: 0;
      }
      .task-overlay .phase-badge {
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        background: #1E293B;
        border: 1px solid #334155;
        padding: 0.22rem 0.55rem;
        border-radius: 999px;
        color: #94A3B8;
        white-space: nowrap;
      }
      .task-overlay .progress-track {
        flex: 1;
        height: 5px;
        background: #273549;
        border-radius: 999px;
        overflow: hidden;
      }
      .task-overlay .progress-fill {
        height: 100%;
        background: #6366F1;
        border-radius: 999px;
        transition: width 0.35s ease;
      }
      .task-overlay .trial-counter {
        font-size: 0.75rem;
        font-weight: 600;
        color: #94A3B8;
        white-space: nowrap;
      }
      .task-overlay .stimulus-area {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 1rem;
      }
      .task-overlay .fixation {
        font-size: 3rem;
        font-weight: 300;
        color: #94A3B8;
        animation: t-fadeUp 0.1s ease;
      }
      .task-overlay .feedback-overlay {
        position: absolute;
        inset: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: 800;
        border-radius: 1rem;
        animation: t-popIn 0.1s ease;
        pointer-events: none;
      }
      .task-overlay .feedback-overlay.correct   { background: rgba(34,197,94,0.15);  color: #22C55E; border: 2px solid rgba(34,197,94,0.3); }
      .task-overlay .feedback-overlay.incorrect { background: rgba(244,63,94,0.15);  color: #F43F5E; border: 2px solid rgba(244,63,94,0.3); }
      .task-overlay .hidden { display: none !important; }

      /* ── RT ─────────────────────────────────────────── */
      .task-overlay .rt-area    { cursor: pointer; }
      .task-overlay .rt-waiting,
      .task-overlay .rt-ready,
      .task-overlay .rt-done,
      .task-overlay .rt-hit,
      .task-overlay .rt-early {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        animation: t-fadeUp 0.15s ease;
      }
      .task-overlay .rt-ring {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 3px solid #334155;
        animation: t-blink 1.5s ease infinite;
      }
      .task-overlay .rt-circle {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: #22C55E;
        box-shadow: 0 0 60px rgba(34,197,94,0.5);
        animation: t-popIn 0.1s ease;
      }
      .task-overlay .rt-circle-flash {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: #ffffff;
        animation: t-rtHitFlash 0.32s ease-out forwards;
      }
      .task-overlay .rt-label { font-size: 1.2rem; font-weight: 700; color: #94A3B8; }
      .task-overlay .rt-label.early { color: #F43F5E; font-size: 1.5rem; }
      .task-overlay .rt-sublabel { font-size: 0.85rem; color: #94A3B8; }

      /* ── Stroop ─────────────────────────────────────── */
      .task-overlay .response-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.55rem;
        padding: 0.5rem 0.7rem 0.9rem;
        flex-shrink: 0;
      }
      @media (orientation: landscape) and (min-width: 600px) {
        .task-overlay .response-buttons { grid-template-columns: repeat(4, 1fr); }
      }
      .task-overlay .stimulus-word {
        font-size: clamp(3rem, 14vw, 7rem);
        font-weight: 900;
        letter-spacing: 0.06em;
        text-align: center;
        animation: t-popIn 0.1s ease;
        user-select: none;
      }
      .task-overlay .resp-btn {
        background: var(--btn-color);
        border: none;
        border-radius: 1rem;
        color: #fff;
        font-family: inherit;
        font-size: 1.05rem;
        font-weight: 800;
        padding: 1rem 0.5rem;
        cursor: pointer;
        transition: filter 0.1s, transform 0.08s;
        text-shadow: 0 1px 3px rgba(0,0,0,0.35);
        box-shadow: 0 3px 10px rgba(0,0,0,0.25);
        min-height: 68px;
      }
      .task-overlay .resp-btn:active { filter: brightness(0.82); transform: scale(0.96); }
      .task-overlay .resp-btn:disabled { opacity: 0.35; cursor: default; }
      .task-overlay .stroop-example {
        display: flex;
        align-items: center;
        gap: 1rem;
        background: #1E293B;
        border: 1px solid #334155;
        border-radius: 1rem;
        padding: 1rem 1.25rem;
      }

      /* ── Go/No-Go ───────────────────────────────────── */
      .task-overlay .gonogo-area  { cursor: pointer; }
      .task-overlay .gonogo-stim  { display: flex; align-items: center; justify-content: center; }
      .task-overlay .gg-circle {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: #22C55E;
        box-shadow: 0 0 60px rgba(34,197,94,0.45);
        animation: t-popIn 0.12s ease;
      }
      .task-overlay .gg-circle.sm { width: 32px; height: 32px; flex-shrink: 0; }
      .task-overlay .gg-x {
        font-size: 7rem;
        font-weight: 900;
        color: #F43F5E;
        text-shadow: 0 0 40px rgba(244,63,94,0.5);
        animation: t-popIn 0.12s ease;
        line-height: 1;
      }
      .task-overlay .gg-x.sm { font-size: 1.4rem; flex-shrink: 0; }
      .task-overlay .gonogo-legend {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        background: #1E293B;
        border: 1px solid #334155;
        border-radius: 1rem;
        padding: 1rem 1.25rem;
      }
      .task-overlay .gg-legend-item {
        display: flex;
        align-items: center;
        gap: 1rem;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <header>
      <a class="brand" href=".">sssss</a>
      <div class="header-actions">
        <a class="admin-link" href="admin.html">admin</a>
      </div>
    </header>

    <main>
      <div id="splashOverlay" class="splash-overlay">
        <img src="" alt="" />
      </div>

      <section id="home">
        <p class="home-title">LAMP · UMAG</p>
        <h1 class="home-heading">Encuestas disponibles</h1>
        <div id="surveyList" class="list"></div>
      </section>

      <section id="runner">
        <div id="meta"></div>
        <div class="progress"><div class="bar" id="bar"></div></div>
        <div id="question"></div>
        <div id="options" class="options"></div>
        <div id="controls" class="controls"></div>
        <div class="tiny" id="footnote"></div>
      </section>
    </main>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
